<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Register
        </button>
        <p>
            Already have an account?
            <a href="{% url 'login' %}">
                Login
            </a>
        </p>

    </form>

</body>
</html>
